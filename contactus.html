<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav>
            <ul>
                <img src="src/k-logo1(1).png" class="logo">
                <li><a href="index.html">Home</a></li>
                <li><a href="service.html">Services</a></li>
                <li><a href="portofolio.html">Portfolio</a></li>
                <li><a href="aboutus.html">About Us</a></li>
                <li><a href="contactus.html">Contact Us</a></li>
            </ul>
            <button type="button"><a href="login/index-login.html" class="b-login">Registrasi</a></button>
        </nav>
    </header>

    <main>
        <div class="container-2">
            <h1>Keep in Touch</h1>
            <form action="http://localhost:3000/contact" method="POST">
                <input
                    type="text"
                    name="name"
                    placeholder="Nama"
                    required
                >

                <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    required
                >

                <textarea
                    name="message"
                    placeholder="Pesan"
                    required
                ></textarea>

                <button type="submit">
                    Kirim
                </button>
            </form>
        </div>
    </main>
       
    <footer>
